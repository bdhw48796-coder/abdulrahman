<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <a href="main " class="main">main </a>
    <a href="make an order" class="main">make an order</a>
    <a href="contact us" class="main">contact us</a>
    <h1>Black goose bistro | Pizza-on-demand</h1>
    <P>Our 12"wood-fired pizza are available for delivery, build your custom pizza and we'll deliver it within an hour.</P>
    <fieldset>
        <legend>your information</legend>
        <label for="name">Name:</label>
        <input type="text" name="name" placeholder="name">
        <br>
        <label for="address">Address:</label>   
        <input type="text" name="address" placeholder="address">
        <br>
        <label for="telephone">Telephone number:</label>
        <input type="tel" name="telephone number" id="tel">
        <br>
        <label for="email">Email:</label>
        <input type="email" name="email" placeholder="email">
        <br>
        <label for="comments">Delivery instructions:</label>
        <textarea name="comments" id="comments" placeholder="comments"></textarea>
    </fieldset>
    <h2 class="design">Design Your dream Pizza:</h2>
    <div>
        <fieldset>
            <legend>pizza specs</legend>
            <input type="radio" name="crust" id="thin" value="classic white">
            <label for="thin">Classic White</label>
            <br>
            <input type="radio" name="crust" id="thick" value="multigrain">
            <label for="thick">Multigrain</label>
            <br>
            <input type="radio" name="crust" id="stuffed" value="choose_stuffed crust">
            <label for="stuffed">Choose Stuffed Crust</label>
            <br>
            <input type="radio" name="crust" id="cheese" value="gluten free">
            <label for="cheese">Gluten Free</label>
        </fieldset>
    </div>
    <div>
        <fieldset>
            <legend>toppings (choose as many as you want)</legend>
            <input type="checkbox" name="toppings" id="pepperoni" value="pepperoni">
            <label for="pepperoni">Red Sauce</label>
            <br>
            <input type="checkbox" name="toppings" id="mushrooms" value="mushrooms">
            <label for="mushrooms">White Sauce</label>
            <br>
            <input type="checkbox" name="toppings" id="onions" value="onions">
            <label for="onions">Mozzarella Cheese</label>
            <br>
            <input type="checkbox" name="toppings" id="sausage" value="sausage">
            <label for="sausage">Pepperoni</label>
            <br>
            <input type="checkbox" name="toppings" id="bacon" value="bacon">
            <label for="bacon">Mushrooms</label>
            <br>
            <input type="checkbox" name="toppings" id="extra_cheese" value="extra cheese">
            <label for="extra_cheese">Peppers</label>
            <br>
            <input type="checkbox" name="toppings" id="black_olives" value="black olives">
            <label for="black_olives">Anchovies</label>
        </fieldset>
    </div>
    <div>
        <fieldset>
            <legend>number</legend>
            <label for="quantity">how many pizzas?</label>
            <input type="number" name="quantity" id="quantity" min="1" value="1">
        </fieldset>
    </div>
    <div>
        <input type="button" value="bring me a pizza" id="submit">
        <input type="reset" value="reset">
    
    </div>
       

    
</body>
</html>
